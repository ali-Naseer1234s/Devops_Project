name: Node.js DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 742573506475.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t nodejs-devops-app:latest .

      - name: Tag Docker Image
        run: |
          docker tag nodejs-devops-app:latest 742573506475.dkr.ecr.eu-north-1.amazonaws.com/nodejs-devops-app:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 742573506475.dkr.ecr.eu-north-1.amazonaws.com/nodejs-devops-app:latest

      - name: Deploy on EC2 Minikube
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2 successfully"

            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 742573506475.dkr.ecr.eu-north-1.amazonaws.com

            kubectl delete secret ecr-secret --ignore-not-found=true

            kubectl create secret docker-registry ecr-secret \
              --docker-server=742573506475.dkr.ecr.eu-north-1.amazonaws.com \
              --docker-username=AWS \
              --docker-password="$(aws ecr get-login-password --region eu-north-1)"

            cd /home/ec2-user/k8s

            kubectl apply -f deployment.yaml --validate=false
            kubectl apply -f service.yaml --validate=false

            kubectl rollout restart deployment/nodejs-devops-app

            sleep 20

            kubectl get pods
            kubectl get services

            echo "Deployment completed successfully"
