name: Node.js DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 742573506475.dkr.ecr.eu-north-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t nodejs-devops-app:latest .

      - name: Tag Docker Image
        run: |
          docker tag nodejs-devops-app:latest 742573506475.dkr.ecr.eu-north-1.amazonaws.com/nodejs-devops-app:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 742573506475.dkr.ecr.eu-north-1.amazonaws.com/nodejs-devops-app:latest

      - name: Finish Pipeline
        run: |
          echo "CI/CD pipeline completed successfully"
